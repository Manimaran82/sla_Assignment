<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Overlapping Fix</title>
  <style>
  
    
    
    
    .relative-parent {
      position: relative;
      background-color: brown;
      width: 300px;
      height: 150px;
      border: 2px solid red;
      margin: 50px auto;
    }

    .absolute-child {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: yellow;
      padding: 10px;
    }
  </style>
</head>
<body>



  <h2 style="text-align:center;">Absolute Position Fix</h2>

  <div class="relative-parent">
    <div class="absolute-child">Positioned Child</div>
  </div>

</body>
</html>
