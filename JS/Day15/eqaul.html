<script>
    console.log(0 == '')
console.log(0 === '')

console.log('5' == 5)
console.log('5' === 5)

console.log(null == undefined)
console.log(null === undefined)

let a = 10
let b = '10'

if (a == b) {
    console.log('== : Equal')
} else {
    console.log('== : Not Equal')
}

if (a === b) {
    console.log('=== : Equal')
} else {
    console.log('=== : Not Equal')
}
</script>
