<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM with Bootstrap</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">DOM Selection Demo</h2>

    
    <div class="text-center mb-4">
        <button id="btn" class="btn btn-primary">Click Me</button>
    </div>

    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card p-3">Card 1</div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">Card 2</div>
        </div>
    </div>

    
    <ul class="list-group">
        <li class="list-group-item item">Item 1</li>
        <li class="list-group-item item">Item 2</li>
        <li class="list-group-item item">Item 3</li>
    </ul>

</div>

<script>
   
    const button = document.getElementById('btn');
    button.addEventListener('click', () => {
        alert("Button clicked using getElementById");
    });

   
    const firstCard = document.querySelector('.card');
    firstCard.classList.add('bg-info', 'text-white');

  
    const items = document.querySelectorAll('.item');

    items.forEach((item, index) => {
        item.classList.add('text-success');
        item.textContent = "Updated Item " + (index + 1);
    });
</script>

</body>
</html>
